<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣威力彩</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

<div class="container">

    <div class="lottery-card">

        <h1 class="title">
            🎱 台灣威力彩最新開獎
        </h1>

        <!-- 👇 新增作者資訊 -->
        <div class="author-info">
            姓名：楊哲綸<br>
            學號：B3232064
        </div>

        <div class="balls-container">

            {% for num in data.numbers %}
                <div class="ball orange">
                    {{ num }}
                </div>
            {% endfor %}

            <div class="ball red">
                {{ data.special }}
            </div>

        </div>

        <div class="info">
            <p>{{ data.period }}</p>
            <p>{{ data.date }}</p>
        </div>

    </div>

</div>

</body>
</html>
